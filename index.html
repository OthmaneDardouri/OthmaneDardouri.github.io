<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>League Roulette</title>
</head>
<body>
  <h1>League Roulette</h1>
  <button id="roll">Roll champion</button>

  <h2 id="name">Jhin</h2>
  <p id="title">The Virtuoso</p>
  <img id="img" src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Jhin_0.jpg" alt="Jhin splash art" width="600" />
  <p id="desc">A precise marksman who treats combat like art.</p>

  <script>
    const version = '14.24.1';
    const url = `https://ddragon.leagueoflegends.com/cdn/${version}/data/en_US/champion.json`;

    const nameEl = document.getElementById('name');
    const titleEl = document.getElementById('title');
    const img = document.getElementById('img');
    const desc = document.getElementById('desc');
    let champs = [];

    fetch(url)
      .then(r => r.json())
      .then(d => { champs = Object.values(d.data); });

    document.getElementById('roll').onclick = () => {
      if (!champs.length) return;
      const c = champs[Math.floor(Math.random() * champs.length)];
      nameEl.textContent = c.name;
      titleEl.textContent = c.title;
      img.src = `https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${c.id}_0.jpg`;
      img.alt = `${c.name} splash art`;
      desc.textContent = `${c.name} is a ${c.tags.join(' / ').toLowerCase()} champion known as ${c.title}.`;
    };
  </script>
</body>
</html>
